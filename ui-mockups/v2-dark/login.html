<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | MEDTRACK - Dark Clinical</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #e4e4e7;
    }

    .login-container {
      display: flex;
      width: min(900px, 95vw);
      min-height: 500px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
    }

    .login-brand {
      flex: 1;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem;
      border-right: 1px solid #1e293b;
    }

    .login-brand .logo {
      font-size: 2rem;
      font-weight: 700;
      color: #22d3ee;
      letter-spacing: 0.06em;
      margin-bottom: 0.75rem;
    }

    .login-brand .logo-line {
      width: 40px;
      height: 3px;
      background: #22d3ee;
      border-radius: 2px;
      margin-bottom: 1rem;
    }

    .login-brand .tagline {
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 280px;
    }

    .login-brand .stat-row {
      display: flex;
      gap: 2rem;
      margin-top: 2.5rem;
    }

    .login-brand .stat-item .stat-num {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e2e8f0;
    }

    .login-brand .stat-item .stat-lbl {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #64748b;
      font-weight: 600;
    }

    .login-form-side {
      flex: 1;
      background: #111118;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }

    .login-form-inner {
      width: 100%;
      max-width: 320px;
    }

    .login-form-inner h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 0.3rem;
    }

    .login-form-inner .subtitle {
      color: #64748b;
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    .form-group { margin-bottom: 1.25rem; }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.7rem 0.85rem;
      border: 1px solid #1e293b;
      border-radius: 8px;
      background: #0f0f17;
      color: #e2e8f0;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #22d3ee; }
    .form-group input::placeholder { color: #475569; }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
      color: #fca5a5;
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }

    .btn-login {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      background: #22d3ee;
      color: #0a0a0f;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.02em;
    }
    .btn-login:hover { background: #06b6d4; }

    @media (max-width: 640px) {
      .login-brand { display: none; }
      .login-container { border-radius: 0; min-height: 100vh; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-brand">
      <div class="logo">MEDTRACK</div>
      <div class="logo-line"></div>
      <p class="tagline">Clinical follow-up tracking system for efficient patient case management across ANC, surgical, and non-surgical pathways.</p>
      <div class="stat-row">
        <div class="stat-item">
          <div class="stat-num">2,480</div>
          <div class="stat-lbl">Total Cases</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">98.5%</div>
          <div class="stat-lbl">Follow-up Rate</div>
        </div>
      </div>
    </div>
    <div class="login-form-side">
      <div class="login-form-inner">
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to continue to your dashboard.</p>

        <form>
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" autofocus>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password">
          </div>
          <button type="submit" class="btn-login">Sign In</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
